<mat-card class="collection-card">
  <mat-card-header class="collection-card-header">
    <mat-card-title class="collection-title">
      <mat-icon class="collection-icon">collections_bookmark</mat-icon>
      <span>{{ collection.name }}</span>
    </mat-card-title>
    <span class="header-spacer"></span>
    <button
      mat-icon-button
      color="warn"
      class="delete-btn"
      [disabled]="isDeleting"
      (click)="onDelete()"
      [title]="'collections.deleteCollection' | translate"
    >
      <mat-spinner *ngIf="isDeleting" diameter="20"></mat-spinner>
      <mat-icon *ngIf="!isDeleting">delete</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content class="collection-card-content">
    <p class="collection-description" *ngIf="collection.description">
      {{ collection.description }}
    </p>

    <div class="add-product-section">
      <app-product-autocomplete
        [label]="'collections.addProduct' | translate"
        (productSelected)="onProductSelected($event)"
      ></app-product-autocomplete>
    </div>

    <div class="products-section">
      <div class="products-empty" *ngIf="pendingProducts.length === 0">
        <mat-icon>inventory_2</mat-icon>
        <span>{{ "collections.emptyProducts" | translate }}</span>
      </div>

      <mat-chip-list class="products-chips" *ngIf="pendingProducts.length > 0">
        <mat-chip
          *ngFor="let product of pendingProducts"
          class="product-chip"
          [removable]="true"
          (removed)="removeProduct(product.id)"
        >
          {{ product.name }}
          <mat-icon matChipRemove>cancel</mat-icon>
        </mat-chip>
      </mat-chip-list>
    </div>
  </mat-card-content>

  <mat-card-actions class="collection-card-actions" *ngIf="hasChanges">
    <button
      mat-flat-button
      color="primary"
      [disabled]="isSaving"
      (click)="onSave()"
    >
      <mat-spinner *ngIf="isSaving" diameter="18" class="btn-spinner"></mat-spinner>
      <span *ngIf="!isSaving">{{ "common.save" | translate }}</span>
      <span *ngIf="isSaving">{{ "common.updatingButtonText" | translate }}</span>
    </button>
    <button mat-stroked-button [disabled]="isSaving" (click)="onCancel()">
      {{ "common.cancel" | translate }}
    </button>
  </mat-card-actions>
</mat-card>
