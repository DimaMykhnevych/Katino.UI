<div class="section-card">
  <div class="section-header">
    <h2 class="section-title">{{ "statistics.topSellingProducts.title" | translate }}</h2>
    <app-spinner *ngIf="isLoading" [diameter]="28"></app-spinner>
  </div>

  <ng-container *ngIf="!isLoading || products.length > 0">
    <ng-container *ngIf="products.length > 0; else emptyState">
      <div class="chart-wrapper" [style.height.px]="chartHeight">
        <canvas
          baseChart
          [data]="chartData"
          [options]="chartOptions"
          [plugins]="chartPlugins"
          type="bar"
        ></canvas>
      </div>

      <mat-paginator
        [length]="totalCount"
        [pageIndex]="pageIndex"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChanged($event)"
      ></mat-paginator>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state" *ngIf="!isLoading">
        <mat-icon class="empty-icon">bar_chart</mat-icon>
        <p>{{ "statistics.topSellingProducts.empty" | translate }}</p>
      </div>
    </ng-template>
  </ng-container>
</div>
