<mat-expansion-panel class="section-card" [expanded]="true">
  <mat-expansion-panel-header>
    <mat-panel-title>
      <span class="section-title">{{ "statistics.topSellingProducts.title" | translate }}</span>
      <app-spinner *ngIf="isLoading" [diameter]="20"></app-spinner>
    </mat-panel-title>
  </mat-expansion-panel-header>

  <ng-container *ngIf="!isLoading || products.length > 0">
    <ng-container *ngIf="products.length > 0; else emptyState">
      <div class="chart-wrapper" [style.height.px]="chartHeight">
        <canvas
          baseChart
          [data]="chartData"
          [options]="chartOptions"
          [plugins]="chartPlugins"
          type="bar"
        ></canvas>
      </div>

      <mat-paginator
        [length]="totalCount"
        [pageIndex]="pageIndex"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChanged($event)"
      ></mat-paginator>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state" *ngIf="!isLoading">
        <mat-icon class="empty-icon">bar_chart</mat-icon>
        <p>{{ "statistics.topSellingProducts.empty" | translate }}</p>
      </div>
    </ng-template>
  </ng-container>
</mat-expansion-panel>
